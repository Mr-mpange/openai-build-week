<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BiasharaSauti</title>
    <meta
      name="description"
      content="AI business assistant for African SMEs. Manage WhatsApp conversations, voice notes, orders, quotations, invoices and payments in one place."
    />
    <link rel="icon" href="%BASE_URL%favicon.ico" />
    <script>
      // Receive redirect from 404.html and restore the original URL so the SPA router works.
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle the ?p= query param approach
        var search = window.location.search;
        if (search.slice(1, 3) === "p=") {
          var decoded = search
            .slice(1)
            .split("&")
            .reduce(function (acc, cur) {
              var parts = cur.split("=");
              acc[parts[0]] = parts
                .slice(1)
                .join("=")
                .replace(/~and~/g, "&");
              return acc;
            }, {});
          window.history.replaceState(
            null,
            null,
            window.location.pathname.slice(0, -1) +
              (decoded.p || "") +
              (decoded.q ? "?" + decoded.q : "") +
              window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
