<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BiasharaSauti</title>
    <meta
      name="description"
      content="AI business assistant for African SMEs. Manage WhatsApp conversations, voice notes, orders, quotations, invoices and payments in one place."
    />
    <link rel="icon" href="%BASE_URL%favicon.ico" />
    <script>
      // Restore the original URL saved by 404.html before the SPA router boots.
      (function () {
        var redirect = sessionStorage.getItem("spa_redirect");
        if (redirect) {
          sessionStorage.removeItem("spa_redirect");
          // Only restore if it's a different path (avoids infinite loop)
          if (redirect !== window.location.href) {
            window.history.replaceState(null, null, redirect);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
